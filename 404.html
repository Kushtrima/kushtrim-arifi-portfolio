<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#212121">

    <meta name="description" content="The page you were looking for doesn't exist. Browse the portfolio of UX/UI Designer & Front-End Engineer Kushtrim Arifi instead.">
    <meta name="robots" content="noindex, follow">

    <!-- Favicon (absolute paths so they work for any 404 URL) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="/styles.css">

    <style>
        /* Force dark background regardless of body class on this page */
        html, body { background-color: #212121; color: #ffffff; }
        .not-found {
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
        }
        .not-found-code {
            font-family: 'Times New Roman', serif;
            font-size: clamp(96px, 20vw, 240px);
            font-weight: 300;
            line-height: 1;
            margin: 0 0 16px;
            letter-spacing: -4px;
            color: #ffffff;
        }
        .not-found-title {
            font-family: 'Times New Roman', serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 300;
            margin: 0 0 24px;
            color: #ffffff;
        }
        .not-found-text {
            max-width: 540px;
            font-size: 17px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 40px;
        }
        .not-found-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .not-found-btn {
            display: inline-block;
            padding: 14px 32px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 999px;
            text-decoration: none;
            color: #ffffff;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .not-found-btn:hover {
            background: #ffffff;
            color: #212121;
            border-color: #ffffff;
        }
    </style>
</head>

<body class="dark-mode">
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/" class="logo-text">Kushtrim [a]</a>
            </div>
            <nav class="navigation">
                <ul class="nav-list">
                    <li><a href="/work.html" class="nav-link">Work</a></li>
                    <li><a href="/about.html" class="nav-link">About</a></li>
                    <li><a href="/work/resume/resume-ka.pdf" target="_blank" rel="noopener noreferrer" class="nav-link">Resume</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content" class="not-found">
        <p class="not-found-code">404</p>
        <h1 class="not-found-title">Page not found</h1>
        <p class="not-found-text">The page you were looking for doesn't exist or has moved. Try heading back home or browsing my work.</p>
        <div class="not-found-actions">
            <a href="/" class="not-found-btn">Home</a>
            <a href="/work.html" class="not-found-btn">View Work</a>
            <a href="/about.html" class="not-found-btn">About</a>
        </div>
    </main>
</body>

</html>
